<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebTime</title>
    <link href="../css/popup.css" rel="stylesheet">
</head>
<body>
    <main class="popup-shell">
        <p class="popup-shell__eyebrow">WebTime</p>
        <h1>Today on <span data-role="site">Loading...</span></h1>
        <p class="popup-shell__status" data-role="status">Loading...</p>

        <section class="metric-grid">
            <article class="metric-card">
                <p class="metric-card__label">Usage</p>
                <p class="metric-card__value" data-role="usage">--</p>
            </article>
            <article class="metric-card">
                <p class="metric-card__label">Remaining</p>
                <p class="metric-card__value" data-role="remaining">--</p>
            </article>
        </section>

        <div class="action-row">
            <button type="button" data-role="toggle-block">Block site</button>
            <button type="button" class="button-secondary" data-role="open-options">Settings</button>
        </div>
    </main>

    <script src="../js/shared.js"></script>
    <script src="../js/popup.js"></script>
</body>
</html>
