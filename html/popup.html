<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebTime</title>
    <link href="../css/popup.css" rel="stylesheet">
</head>
<body>
    <main class="popup-shell">
        <p class="popup-shell__eyebrow">WebTime</p>
        <h1>Today on <span data-role="site">Loading...</span></h1>
        <p class="popup-shell__status" data-role="status">Loading...</p>

        <section class="metric-grid">
            <article class="metric-card">
                <p class="metric-card__label">Current site</p>
                <p class="metric-card__value" data-role="usage">--</p>
            </article>
            <article class="metric-card">
                <p class="metric-card__label">Assigned limit</p>
                <p class="metric-card__value" data-role="limit">--</p>
            </article>
        </section>

        <section class="chart-panel">
            <div class="chart-panel__ring" data-role="chart" aria-hidden="true"></div>
            <p class="chart-panel__total" data-role="total">Loading...</p>
            <ul class="legend" data-role="legend"></ul>
        </section>

        <p class="popup-footer" data-role="footer">Loading...</p>
    </main>

    <script src="../js/shared.js"></script>
    <script src="../js/popup.js"></script>
</body>
</html>
